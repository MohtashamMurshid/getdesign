appId: com.getdesign.studio
productName: Studio
directories:
  buildResources: resources
  output: dist
files:
  - out/**
  - package.json
asar: true
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: false
win:
  target:
    - target: nsis
      arch: [x64, arm64]
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
linux:
  category: Development
  target:
    - target: AppImage
      arch: [x64, arm64]
    - target: deb
      arch: [x64, arm64]
publish:
  provider: github
  owner: MohtashamMurshid
  repo: getdesign
  releaseType: release
